<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body class="onyou-sidepannel-body">
    <div class="panel-container">
        <header class="panel-header">
            <h3>ON YOU</h3>
        </header>

        <main class="panel-main">
            <!-- Main view for upload or result -->
            <div id="main-view">
                <div id="upload-section" class="upload-container">
                    <label for="userImageInput" class="upload-label">
                        <div id="upload-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        </div>
                        <span>Upload Your Photo</span>
                    </label>
                    <input type="file" id="userImageInput" accept="image/*" hidden>
                </div>

                <div id="image-preview-container" class="image-preview" style="display: none;">
                    <img id="image-preview" src="" alt="Your Uploaded Photo">
                    <button id="change-image-btn" title="Change Photo">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                </div>

                <div id="result-section" class="result-container" style="display: none;">
                    <!-- Content injected by JS -->
                </div>
            </div>
        </main>
        
        <footer class="panel-footer">
            <h4>Fitting Room</h4>
            <!-- Container for the horizontally scrolling items -->
            <div id="history-container" class="history-container">
                <div id="history-scroll" class="history-scroll">
                    <!-- The placeholder is now the only initial child -->
                    <p id="history-placeholder">Your try-ons will appear here.</p>
                </div>
            </div>
        </footer>
    </div>
    <script src="sidepanel.js"></script>
</body>
</html>
